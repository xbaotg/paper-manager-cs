services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: paper-manager-cs
    container_name: paper-manager-cs
    ports:
      # App is served under basePath "/paper" -> http://localhost:3000/paper
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_FILE: /app/data/app.db
      # Signing key for session cookies — REQUIRED. Set in .env.
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      # Bootstrap manager account, created on first boot if no users exist.
      INITIAL_ADMIN_USER: ${INITIAL_ADMIN_USER:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?set INITIAL_ADMIN_PASSWORD in .env}
    volumes:
      # Persist the SQLite datastore across container rebuilds/restarts
      - paper-data:/app/data
    restart: unless-stopped

volumes:
  paper-data:
